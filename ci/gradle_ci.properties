# Project-wide Gradle settings.
POM_URL=https://github.com/mapbox/mapbox-navigation-android
POM_SCM_URL=https://github.com/mapbox/mapbox-navigation-android
POM_SCM_CONNECTION=scm:git@github.com:mapbox/mapbox-navigation-android.git
POM_SCM_DEV_CONNECTION=scm:git@github.com:mapbox/mapbox-navigation-android.git

POM_LICENCE_NAME=The MIT License
POM_LICENCE_URL=https://opensource.org/licenses/MIT
POM_LICENCE_DIST=repo

POM_DEVELOPER_ID=mapbox
POM_DEVELOPER_NAME=Mapbox

# IDE (e.g. Android Studio) users:
# Gradle settings configured through the IDE *will override*
# any settings specified in this file.

# For more details on how to configure your build environment visit
# http://www.gradle.org/docs/current/userguide/build_environment.html

# Specifies the JVM arguments used for the daemon process.
# The setting is particularly useful for tweaking memory settings.
# Gradle daemon heap. Kept below total RAM to leave room for the Kotlin compiler daemon
# and OS (see kotlin.daemon.jvm.options below). On an 8GB CI machine (resource_class
# large) the split is: Gradle daemon ~3GB heap + ~1GB metaspace + Kotlin daemon ~2GB
# heap + OS ~1GB = ~7GB.
# Metaspace is sized generously because when the Kotlin daemon fails to connect the
# compiler falls back to in-process execution inside this JVM, and a small metaspace
# cap then triggers OutOfMemoryError: Metaspace while compiling many modules.
org.gradle.jvmargs=-Xmx3072M -XX:MaxMetaspaceSize=1024M
android.useAndroidX=true
android.enableJetifier=false
android.nonTransitiveRClass=false
android.nonFinalResIds=false

# Kotlin compiler daemon runs as a separate process alongside the Gradle daemon.
# Cap its heap explicitly so the two daemons together stay within available RAM.
# -Xss8m: prevents StackOverflowError when compiling MapboxRouteLineViewTest.kt
# (see https://youtrack.jetbrains.com/issue/KT-46822)
systemProp.kotlin.daemon.jvm.options=-Xss8m -Xmx2048m

# Bound the number of concurrent worker JVMs (Kotlin compile / kapt). Without this,
# Gradle defaults to one worker per CPU, so an 8-CPU xlarge runner would spawn up to
# 8 memory-hungry workers and exhaust RAM, causing the daemon to be OOM-killed
# ("Gradle build daemon disappeared unexpectedly").
org.gradle.workers.max=4

# When configured, Gradle will run in incubating parallel mode.
# This option should only be used with decoupled projects. More details, visit
# http://www.gradle.org/docs/current/userguide/multi_project_builds.html#sec:decoupled_projects
# org.gradle.parallel=true