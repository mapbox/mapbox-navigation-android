apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'
apply plugin: 'kotlinx-serialization'
apply plugin: 'kotlin-kapt'
apply plugin: 'kotlin-parcelize'
apply plugin: 'org.jetbrains.dokka'
apply plugin: 'com.jaredsburrows.license'
apply plugin: 'com.mapbox.android.sdk.versions'
apply from: "../gradle/ktlint.gradle"
apply from: file("../gradle/artifact-settings.gradle")
apply from: "../gradle/kdoc-settings.gradle"

version = project.ext.versionName
group = project.ext.mapboxArtifactGroupId

android {
    compileSdkVersion androidVersions.compileSdkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        minSdkVersion androidVersions.minSdkVersion
        targetSdkVersion androidVersions.targetSdkVersion
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        consumerProguardFiles 'proguard-rules.pro', "../proguard/proguard-project.pro"
    }

    testOptions {
        unitTests.returnDefaultValues = true
        unitTests.includeAndroidResources = true
    }
}

dependencies {
    api project(":libnavigation-core")
    implementation project(":libnavigation-util")
    implementation dependenciesList.mapboxMapGptExpAndroid

    implementation dependenciesList.kotlinStdLib
    implementation dependenciesList.coroutinesAndroid
    implementation dependenciesList.kotlinXDateTime
    implementation dependenciesList.kotlinSerialization

    implementation dependenciesList.androidXCore

    apply from: "../gradle/unit-testing-dependencies.gradle"
    testImplementation(project(':libtesting-utils'))
    testImplementation project(':libtesting-navigation-util')

    // Instrumentation tests
    androidTestImplementation dependenciesList.androidxTestJunit
    androidTestImplementation dependenciesList.junit
    androidTestImplementation(dependenciesList.barista) {
        exclude group: 'org.jetbrains.kotlin'
        exclude group: 'androidx.annotation'
    }
    androidTestImplementation dependenciesList.mockwebserver
    androidTestImplementation dependenciesList.coroutinesAndroid
    androidTestImplementation dependenciesList.testRunner
    androidTestUtil dependenciesList.testOrchestrator
}

dokkaHtmlPartial {
    outputDirectory.set(kdocPath)
    moduleName.set("Feedback Agent")
    dokkaSourceSets {
        configureEach {
            reportUndocumented.set(true)

            perPackageOption {
                matchingRegex.set("com.mapbox.navigation.voicefeedback.internal.*")
                suppress.set(true)
            }
        }
    }
}

apply from: "../gradle/track-public-apis.gradle"
apply from: "../gradle/jacoco.gradle"
apply from: "../gradle/publish.gradle"